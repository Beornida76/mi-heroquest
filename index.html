<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>War Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pantalla-seleccion">
        <h1>War Quest</h1>
        <p class="intro-text">"El mundo se sumerge en las sombras. Las hordas del Caos han usurpado las fortalezas ancestrales. Elige a tu campeón y adéntrate en la mazmorra."</p>
        <div class="grid-heroe" id="selector"></div>
    </div>

    <div id="juego-contenedor">
        <div class="panel">
            <h2 id="turno-txt" style="color: #c69c6d;">Turno: Jugador</h2>
            <p><strong>Héroe: <span id="nombre-heroe"></span></strong></p>
            <p>Vida: <span id="vida-heroe"></span> | Mov: <span id="mov-heroe">0</span></p>
            <button id="btn-mov" onclick="tirarDadosMovimiento()">Tirar Dados</button>
            <button id="btn-atk" onclick="atacarEnemigo()" disabled>Atacar</button>
            <button id="btn-end" onclick="finalizarTurno()" style="display: block; margin-top: 10px; width: 100%;">Finalizar Turno</button>
            <h3>Bitácora</h3>
            <div id="log-combate"></div>
        </div>
        <div id="tablero"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
