<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>War Quest - Elige tu Héroe</title>
    <style>
        body { background-color: #050505; color: #d1cbc1; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* Pantalla de Selección */
        #pantalla-seleccion { text-align: center; padding: 40px; max-width: 900px; }
        h1 { font-size: 4em; color: #c69c6d; text-transform: uppercase; text-shadow: 3px 3px 6px #000; margin-bottom: 10px; font-family: 'Times New Roman', serif; }
        .intro-text { font-style: italic; margin-bottom: 30px; font-size: 1.3em; color: #e0d0b0; }
        
        .grid-heroe { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 20px; border: 2px solid #555; cursor: pointer; transition: 0.3s; text-align: left; border-radius: 4px; }
        .card:hover { border-color: #c69c6d; background: #252525; }
        .card h2 { margin-top: 0; color: #c69c6d; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .stats { font-size: 0.9em; margin: 10px 0; color: #aaa; }
        .desc { font-size: 0.85em; color: #888; font-style: italic; }

        /* Estilos del juego */
        .contenedor { display: none; gap: 20px; padding: 20px; }
        #tablero { display: grid; grid-template-columns: repeat(26, 25px); grid-template-rows: repeat(19, 25px); gap: 1px; background-color: #000; padding: 5px; border: 2px solid #444; }
        .casilla { width: 25px; height: 25px; background-color: #000; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .visible { background-color: #222; }
        .muro { background-color: #333; }
        .panel { width: 280px; background: #111; padding: 15px; border: 1px solid #333; }
        #log-combate { height: 150px; overflow-y: auto; background: #000; padding: 10px; font-size: 12px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="pantalla-seleccion">
        <h1>War Quest</h1>
        <p class="intro-text">"La mazmorra aguarda. Elige a tu campeón y enfréntate a las hordas del Caos."</p>
        <div class="grid-heroe" id="selector"></div>
    </div>

    <div class="contenedor" id="juego">
        <div class="panel">
            <h2 id="turno-txt" style="color: #c69c6d;">Turno: Jugador</h2>
            <p><strong><span id="nombre-heroe"></span></strong></p>
            <p>Vida: <span id="vida-heroe"></span> | Mov: <span id="mov-heroe">0</span></p>
            <button id="btn-mov" onclick="tirarDadosMovimiento()">Tirar Dados</button>
            <button id="btn-atk" onclick="atacarEnemigo()" disabled>¡Atacar!</button>
            <h3>Bitácora</h3>
            <div id="log-combate"></div>
        </div>
        <div id="tablero"></div>
    </div>

    <script>
        const HEROES = {
            "Guerrero": { 
                vida: 8, atk: 3, def: 2, icono: "🛡️", 
                desc: "Un maestro del combate cuerpo a cuerpo. Su fuerza bruta y resistencia le permiten enfrentarse a los enemigos más feroces.",
                info: "Dados de Ataque: 3 | Dados de Defensa: 2"
            },
            "Enano": { 
                vida: 7, atk: 2, def: 2, icono: "⛏️", 
                desc: "Experto en desactivar trampas y experto explorador. Su dureza natural lo hace ideal para liderar la vanguardia.",
                info: "Dados de Ataque: 2 | Dados de Defensa: 2"
            },
            "Elfo": { 
                vida: 6, atk: 2, def: 2, icono: "🏹", 
                desc: "Un guerrero ágil y diestro. Combina el dominio de la espada con una velocidad superior en el movimiento.",
                info: "Dados de Ataque: 2 | Dados de Defensa: 2"
            },
            "Mago": { 
                vida: 4, atk: 1, def: 2, icono: "🧙", 
                desc: "Maestro de las artes arcanas. Aunque débil en el cuerpo a cuerpo, su poder mental no tiene rival.",
                info: "Dados de Ataque: 1 | Dados de Defensa: 2"
            }
        };

        // --- Lógica del juego ---
        const selector = document.getElementById('selector');
        for (let nombre in HEROES) {
            let h = HEROES[nombre];
            let div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <h2>${h.icono} ${nombre}</h2>
                <div class="stats">${h.info}</div>
                <div class="desc">${h.desc}</div>
            `;
            div.onclick = () => iniciarJuego(nombre);
            selector.appendChild(div);
        }

        function iniciarJuego(clase) {
            heroe = { ...HEROES[clase], nombre: clase, x: 2, y: 2, mov: 0 };
            document.getElementById('pantalla-seleccion').style.display = 'none';
            document.getElementById('juego').style.display = 'flex';
            document.getElementById('nombre-heroe').innerText = heroe.nombre;
            crearMapa();
            dibujar();
        }

        // --- Funciones de Juego Base (mantienen la lógica previa) ---
        let heroe = null, FILAS = 19, COLS = 26;
        let mapa = Array.from({ length: FILAS }, () => Array(COLS).fill(1));
        let explorado = Array.from({ length: FILAS }, () => Array(COLS).fill(false));
        let enemigos = [{nombre: "Orco", vida: 1, atk: 3, def: 2, icono: "👹", x: 2, y: 2, vivo: true}];
        let turno = "jugador";

        function crearMapa() {
            // Generación simplificada para conexión garantizada
            for(let i=1; i<18; i++) for(let j=1; j<25; j++) mapa[i][j] = 0;
        }

        function dibujar() {
            const tablero = document.getElementById('tablero');
            tablero.innerHTML = '';
            for (let f = 0; f < FILAS; f++) {
                for (let c = 0; c < COLS; c++) {
                    const el = document.createElement('div');
                    el.className = 'casilla ' + (mapa[f][c] === 1 ? 'muro' : 'visible');
                    if (f === heroe.x && c === heroe.y) el.innerText = heroe.icono;
                    else enemigos.forEach(en => { if(en.x === f && en.y === c && en.vivo) el.innerText = en.icono; });
                    tablero.appendChild(el);
                }
            }
        }

        // (Se mantienen las funciones de movimiento y combate ya establecidas)
        function tirarDadosMovimiento() { heroe.mov = Math.floor(Math.random()*6) + Math.floor(Math.random()*6) + 2; dibujar(); }
        function atacarEnemigo() { /* lógica de ataque */ }
    </script>
</body>
</html>
