<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>War Quest</title>
    <style>
        body { background-color: #050505; color: #d1cbc1; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* Pantalla de Selección */
        #pantalla-seleccion { text-align: center; padding: 40px; max-width: 950px; }
        h1 { font-size: 4.5em; color: #c69c6d; text-transform: uppercase; text-shadow: 4px 4px 8px #000; margin-bottom: 10px; }
        .intro-text { font-style: italic; margin-bottom: 40px; font-size: 1.4em; color: #e0d0b0; }
        .grid-heroe { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .card { background: #1a1a1a; padding: 25px; border: 2px solid #555; cursor: pointer; transition: 0.4s; text-align: left; border-radius: 8px; }
        .card:hover { border-color: #c69c6d; background: #252525; }
        .card h2 { color: #c69c6d; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        /* Contenedor del Juego */
        .contenedor { display: none; gap: 20px; padding: 20px; }
        #tablero { display: grid; grid-template-columns: repeat(26, 25px); grid-template-rows: repeat(19, 25px); gap: 1px; background-color: #000; padding: 5px; border: 2px solid #444; }
        .casilla { width: 25px; height: 25px; background-color: #000; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .visible { background-color: #222; }
        .muro { background-color: #333; }
        .panel { width: 280px; background: #111; padding: 15px; border: 1px solid #333; color: white; }
    </style>
</head>
<body>

    <div id="pantalla-seleccion">
        <h1>War Quest</h1>
        <p class="intro-text">"La mazmorra aguarda. Elige a tu campeón y enfréntate a las hordas del Caos."</p>
        <div class="grid-heroe" id="selector"></div>
    </div>

    <div class="contenedor" id="juego">
        <div class="panel">
            <h2 id="turno-txt" style="color: #c69c6d;">Turno: Jugador</h2>
            <p><strong>Héroe: <span id="nombre-heroe"></span></strong></p>
            <button onclick="tirarDadosMovimiento()">Tirar Dados</button>
            <div id="log-combate" style="height: 100px; overflow-y: auto; background: #000; margin-top: 10px; font-size: 12px;"></div>
        </div>
        <div id="tablero"></div>
    </div>

    <script>
        const HEROES = {
            "Guerrero": { vida: 8, atk: 3, def: 2, icono: "🛡️", desc: "El Guerrero es el pilar de cualquier grupo. Adiestrado en las artes de la guerra...", info: "Dados de Ataque: 3 | Dados de Defensa: 2" },
            "Enano": { vida: 7, atk: 2, def: 2, icono: "⛏️", desc: "Experto en el arte de la exploración. Posee una habilidad innata para detectar trampas...", info: "Dados de Ataque: 2 | Dados de Defensa: 2" },
            "Elfo": { vida: 6, atk: 2, def: 2, icono: "🏹", desc: "Un guerrero de gracia sobrenatural, el Elfo es un maestro de la agilidad...", info: "Dados de Ataque: 2 | Dados de Defensa: 2" },
            "Mago": { vida: 4, atk: 1, def: 2, icono: "🧙", desc: "Poseedor de los secretos arcanos. Su sabiduría y sus poderosos conjuros...", info: "Dados de Ataque: 1 | Dados de Defensa: 2" }
        };

        let heroe = null;
        const selector = document.getElementById('selector');

        // Generar cartas
        for (let nombre in HEROES) {
            let h = HEROES[nombre];
            let div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h2>${h.icono} ${nombre}</h2><p><b>${h.info}</b></p><p>${h.desc}</p>`;
            div.onclick = () => iniciarJuego(nombre);
            selector.appendChild(div);
        }

        function iniciarJuego(clase) {
            heroe = { ...HEROES[clase], nombre: clase, x: 1, y: 1 };
            document.getElementById('pantalla-seleccion').style.display = 'none';
            document.getElementById('juego').style.display = 'flex';
            document.getElementById('nombre-heroe').innerText = heroe.nombre;
            dibujarTablero();
        }

        function dibujarTablero() {
            const tablero = document.getElementById('tablero');
            tablero.innerHTML = '';
            for (let f = 0; f < 19; f++) {
                for (let c = 0; c < 26; c++) {
                    let div = document.createElement('div');
                    div.className = 'casilla ' + ((f==heroe.x && c==heroe.y) ? '' : 'muro');
                    if (f==heroe.x && c==heroe.y) div.innerText = heroe.icono;
                    tablero.appendChild(div);
                }
            }
        }
        
        function tirarDadosMovimiento() {
            alert("Has tirado los dados de movimiento!");
        }
    </script>
</body>
</html>
