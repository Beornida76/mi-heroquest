<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>War Quest</title>
    <style>
        body { background-color: #050505; color: #d1cbc1; font-family: 'Georgia', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Pantalla de Selección */
        #pantalla-seleccion { text-align: center; padding: 40px; max-width: 950px; }
        h1 { font-size: 4.5em; color: #c69c6d; text-transform: uppercase; text-shadow: 4px 4px 8px #000; margin-bottom: 10px; }
        .intro-text { font-style: italic; margin-bottom: 40px; font-size: 1.4em; color: #e0d0b0; line-height: 1.6; }
        .grid-heroe { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .card { background: #1a1a1a; padding: 25px; border: 2px solid #555; cursor: pointer; transition: 0.4s; text-align: left; border-radius: 8px; }
        .card:hover { border-color: #c69c6d; background: #252525; transform: scale(1.02); }
        .card h2 { margin-top: 0; color: #c69c6d; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1.8em; }
        .stats { font-size: 1em; margin: 10px 0; color: #e0d0b0; font-weight: bold; }
        .desc { font-size: 0.95em; color: #a0a0a0; line-height: 1.5; margin-top: 10px; }

        /* Contenedor del Juego */
        #juego-contenedor { display: none; gap: 20px; padding: 20px; }
        #tablero { display: grid; grid-template-columns: repeat(26, 25px); grid-template-rows: repeat(19, 25px); gap: 1px; background-color: #000; padding: 5px; border: 2px solid #444; }
        .casilla { width: 25px; height: 25px; background-color: #000; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .visible { background-color: #222; }
        .muro { background-color: #333; }
        .panel { width: 280px; background: #111; padding: 15px; border: 1px solid #333; }
        #log-combate { height: 150px; overflow-y: auto; background: #000; padding: 10px; font-size: 12px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="pantalla-seleccion">
        <h1>War Quest</h1>
        <p class="intro-text">"El mundo se sumerge en las sombras. Las hordas del Caos, comandadas por el malvado Zargon, han usurpado las fortalezas ancestrales. ¡Prepárate para la aventura!"</p>
        <div class="grid-heroe" id="selector"></div>
    </div>

    <div id="juego-contenedor">
        <div class="panel">
            <h2 id="turno-txt" style="color: #c69c6d;">Turno: Jugador</h2>
            <p><strong>Héroe: <span id="nombre-heroe"></span></strong></p>
            <p>Vida: <span id="vida-heroe"></span> | Mov: <span id="mov-heroe">0</span></p>
            <button id="btn-mov" onclick="tirarDadosMovimiento()">Tirar Dados</button>
            <h3>Bitácora</h3>
            <div id="log-combate"></div>
        </div>
        <div id="tablero"></div>
    </div>

    <script>
        const HEROES = {
            "Guerrero": { vida: 8, atk: 3, def: 2, icono: "🛡️", desc: "El Guerrero es el pilar de cualquier grupo. Adiestrado en las artes de la guerra, su capacidad para infligir daño lo convierte en un combatiente temido.", info: "Dados de Ataque: 3 | Dados de Defensa: 2" },
            "Enano": { vida: 7, atk: 2, def: 2, icono: "⛏️", desc: "Experto en el arte de la exploración, posee una habilidad innata para detectar trampas. Su estoicismo le permite aguantar en el fragor de la batalla.", info: "Dados de Ataque: 2 | Dados de Defensa: 2" },
            "Elfo": { vida: 6, atk: 2, def: 2, icono: "🏹", desc: "Guerrero de gracia sobrenatural, maestro de la agilidad. Capaz de realizar movimientos rápidos y precisos antes de que el enemigo reaccione.", info: "Dados de Ataque: 2 | Dados de Defensa: 2" },
            "Mago": { vida: 4, atk: 1, def: 2, icono: "🧙", desc: "Poseedor de los secretos arcanos. Su sabiduría y sus poderosos conjuros pueden alterar el curso de la batalla en un instante.", info: "Dados de Ataque: 1 | Dados de Defensa: 2" }
        };

        let heroe, FILAS = 19, COLS = 26;
        let mapa = Array.from({ length: FILAS }, () => Array(COLS).fill(1));
        let explorado = Array.from({ length: FILAS }, () => Array(COLS).fill(false));
        let enemigos = [{nombre: "Orco", x: 5, y: 5, vivo: true, icono: "👹"}];

        // Inicializar Selección
        const selector = document.getElementById('selector');
        for (let nombre in HEROES) {
            let h = HEROES[nombre];
            let div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h2>${h.icono} ${nombre}</h2><div class="stats">${h.info}</div><div class="desc">${h.desc}</div>`;
            div.onclick = () => iniciarJuego(nombre);
            selector.appendChild(div);
        }

        function iniciarJuego(clase) {
            heroe = { ...HEROES[clase], nombre: clase, x: 2, y: 2, mov: 0 };
            document.getElementById('pantalla-seleccion').style.display = 'none';
            document.getElementById('juego-contenedor').style.display = 'flex';
            document.getElementById('nombre-heroe').innerText = heroe.nombre;
            crearMapa(); dibujar();
        }

        function crearMapa() {
            const rooms = [{x: 1, y: 1, w: 6, h: 5}, {x: 15, y: 1, w: 6, h: 5}];
            rooms.forEach(q => { for(let i=q.y; i<q.y+q.h; i++) for(let j=q.x; j<q.x+q.w; j++) mapa[i][j] = 0; });
        }

        function dibujar() {
            const tablero = document.getElementById('tablero'); tablero.innerHTML = '';
            for (let f = 0; f < FILAS; f++) {
                for (let c = 0; c < COLS; c++) {
                    if (Math.abs(heroe.x - f) <= 2 && Math.abs(heroe.y - c) <= 2) explorado[f][c] = true;
                    const el = document.createElement('div');
                    el.className = 'casilla';
                    if (explorado[f][c]) {
                        el.classList.add('visible');
                        if (mapa[f][c] === 1) el.classList.add('muro');
                        enemigos.forEach(en => { if(en.x === f && en.y === c && en.vivo) el.innerText = en.icono; });
                    }
                    if (f === heroe.x && c === heroe.y) el.innerText = heroe.icono;
                    tablero.appendChild(el);
                }
            }
            document.getElementById('vida-heroe').innerText = heroe.vida;
            document.getElementById('mov-heroe').innerText = heroe.mov;
        }

        function tirarDadosMovimiento() {
            heroe.mov = Math.floor(Math.random()*6) + Math.floor(Math.random()*6) + 2;
            document.getElementById('btn-mov').disabled = true;
            dibujar();
        }

        window.addEventListener('keydown', (e) => {
            if(heroe.mov <= 0) return;
            let nx = heroe.x, ny = heroe.y;
            if(e.key === 'ArrowUp') nx--; if(e.key === 'ArrowDown') nx++;
            if(e.key === 'ArrowLeft') ny--; if(e.key === 'ArrowRight') ny++;
            if(nx>=0 && nx<FILAS && ny>=0 && ny<COLS && mapa[nx][ny] === 0) { 
                heroe.x = nx; heroe.y = ny; heroe.mov--; dibujar(); 
            }
            if(heroe.mov === 0) document.getElementById('btn-mov').disabled = false;
        });
    </script>
</body>
</html>
