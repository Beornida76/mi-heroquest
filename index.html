<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>War Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de Selección de Personaje -->
    <div id="pantalla-seleccion">
        <h1 id="titulo-juego">War Quest</h1>
        <p class="intro-texto">Adéntrate en las profundidades de la mazmorra, derrota a las hordas del mal y reclama tu gloria. Elige a tu héroe:</p>
        <div id="selector" class="grid-heroe"></div>
    </div>

    <!-- Contenedor del Juego -->
    <div id="juego-contenedor" style="display:none;">
        <div id="tablero"></div>
        <div class="panel">
            <h2 id="nombre-heroe"></h2>
            <p>Vida: <span id="vida-heroe"></span></p>
            <p>Movimiento: <span id="mov-heroe"></span></p>
            <button id="btn-mov" onclick="tirarDadosMovimiento()">Tirar Dados Movimiento</button>
            <button id="btn-atk" onclick="atacarEnemigo()" disabled>Atacar</button>
            <button onclick="finalizarTurno()">Finalizar Turno</button>
            <div id="log-combate"></div>
        </div>
    </div>

    <!-- Pantalla de Derrota -->
    <div id="pantalla-derrota" style="display:none;">
        <h1 class="sangriento">LA MAZMORRA HA<br>RECLAMADO TU ALMA</h1>
        <p>Tus huesos descansarán eternamente en la oscuridad.</p>
        <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1.2em; cursor:pointer; background: #8b0000; color: white; border: 2px solid white;">Volver a Intentarlo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
