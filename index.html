<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>War Quest - Elige tu Héroe</title>
    <style>
        body { background-color: #050505; color: #d1cbc1; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* Pantalla de Selección */
        #pantalla-seleccion { text-align: center; padding: 40px; max-width: 800px; }
        h1 { font-size: 3em; color: #c69c6d; text-transform: uppercase; text-shadow: 2px 2px 4px #000; margin-bottom: 10px; }
        .intro-text { font-style: italic; margin-bottom: 30px; font-size: 1.2em; border-bottom: 1px solid #444; padding-bottom: 20px; }
        
        .grid-heroe { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 15px; border: 2px solid #555; cursor: pointer; border-radius: 4px; transition: 0.3s; width: 140px; }
        .card:hover { border-color: #c69c6d; background: #252525; transform: translateY(-5px); }
        .card h2 { margin: 5px 0; color: #e0d0b0; }

        /* Estilos del juego */
        .contenedor { display: none; gap: 20px; padding: 20px; }
        #tablero { display: grid; grid-template-columns: repeat(26, 25px); grid-template-rows: repeat(19, 25px); gap: 1px; background-color: #000; padding: 5px; border: 2px solid #444; }
        .casilla { width: 25px; height: 25px; background-color: #000; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .visible { background-color: #222; }
        .muro { background-color: #333; }
        .panel { width: 280px; background: #111; padding: 15px; border: 1px solid #333; }
        #log-combate { height: 150px; overflow-y: auto; background: #000; padding: 10px; font-size: 12px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="pantalla-seleccion">
        <h1>War Quest</h1>
        <p class="intro-text">
            "¡El destino del reino está en tus manos! Penetra en las profundidades de la mazmorra, 
            derrota a las fuerzas del mal y reclama tu gloria. El peligro acecha en cada esquina..."
        </p>
        <div class="grid-heroe" id="selector"></div>
    </div>

    <div class="contenedor" id="juego">
        <div class="panel">
            <h2 id="turno-txt" style="color: #c69c6d;">Turno: Jugador</h2>
            <p><strong>Héroe: <span id="nombre-heroe"></span></strong></p>
            <p>Vida: <span id="vida-heroe"></span> | Mov: <span id="mov-heroe">0</span></p>
            <button id="btn-mov" onclick="tirarDadosMovimiento()">Tirar Dados</button>
            <button id="btn-atk" onclick="atacarEnemigo()" disabled>¡Atacar!</button>
            <h3>Enemigos</h3>
            <div id="lista-enemigos"></div>
            <h3>Bitácora</h3>
            <div id="log-combate"></div>
        </div>
        <div id="tablero"></div>
    </div>

    <script>
        const HEROES = {
            "Guerrero": { vida: 8, atk: 3, def: 2, icono: "🛡️" },
            "Enano": { vida: 7, atk: 2, def: 2, icono: "⛏️" },
            "Elfo": { vida: 6, atk: 2, def: 2, icono: "🏹" },
            "Mago": { vida: 4, atk: 1, def: 2, icono: "🧙" }
        };

        const BESTIARIO = {
            "Orco": { vida: 1, atk: 3, def: 2, icono: "👹" },
            "Goblin": { vida: 1, atk: 2, def: 1, icono: "👺" },
            "Fimir": { vida: 3, atk: 3, def: 3, icono: "🐊" }
        };

        // (La lógica de JS se mantiene igual para asegurar compatibilidad)
        let heroe = null, FILAS = 19, COLS = 26;
        let mapa = Array.from({ length: FILAS }, () => Array(COLS).fill(1));
        let explorado = Array.from({ length: FILAS }, () => Array(COLS).fill(false));
        let enemigos = [
            { ...BESTIARIO["Orco"], nombre: "Orco", x: 2, y: 2, vivo: true },
            { ...BESTIARIO["Goblin"], nombre: "Goblin", x: 16, y: 2, vivo: true },
            { ...BESTIARIO["Fimir"], nombre: "Fimir", x: 10, y: 9, vivo: true }
        ];
        let turno = "jugador";

        const selector = document.getElementById('selector');
        for (let nombre in HEROES) {
            let div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h2>${HEROES[nombre].icono}</h2><p>${nombre}<br>V: ${HEROES[nombre].vida} A: ${HEROES[nombre].atk} D: ${HEROES[nombre].def}</p>`;
            div.onclick = () => iniciarJuego(nombre);
            selector.appendChild(div);
        }

        function iniciarJuego(clase) {
            heroe = { ...HEROES[clase], nombre: clase, x: 2, y: 2, mov: 0 };
            document.getElementById('pantalla-seleccion').style.display = 'none';
            document.getElementById('juego').style.display = 'flex';
            document.getElementById('nombre-heroe').innerText = heroe.nombre;
            crearMapa();
            dibujar();
        }

        // --- FUNCIONES DE LÓGICA (Mismas de antes) ---
        function crearMapa() {
            const h = [{x: 1, y: 1, w: 6, h: 5}, {x: 15, y: 1, w: 6, h: 5}, {x: 8, y: 7, w: 6, h: 5}, {x: 1, y: 13, w: 6, h: 5}, {x: 15, y: 13, w: 6, h: 5}];
            h.forEach(q => { for(let i=q.y; i<q.y+q.h; i++) for(let j=q.x; j<q.x+q.w; j++) mapa[i][j] = 0; });
            for(let i=3; i<16; i++) { mapa[i][4] = 0; mapa[i][21] = 0; }
            for(let j=4; j<22; j++) mapa[9][j] = 0;
        }

        function lanzarDados(numDados, esHeroe) {
            let calaveras = 0, escudos = 0;
            for(let i = 0; i < numDados; i++) {
                let cara = Math.floor(Math.random() * 6);
                if (cara < 3) calaveras++;
                else if (esHeroe && (cara === 3 || cara === 4)) escudos++;
                else if (!esHeroe && cara === 5) escudos++;
            }
            return { calaveras, escudos };
        }

        function esAdyacente(a, b) {
            const dx = Math.abs(a.x - b.x); const dy = Math.abs(a.y - b.y);
            return (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
        }

        function log(msg) {
            const div = document.getElementById('log-combate');
            div.innerHTML += `<div>> ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        function dibujar() {
            const tablero = document.getElementById('tablero');
            tablero.innerHTML = '';
            for (let f = 0; f < FILAS; f++) {
                for (let c = 0; c < COLS; c++) {
                    if (Math.abs(heroe.x - f) <= 1 && Math.abs(heroe.y - c) <= 1) explorado[f][c] = true;
                    const el = document.createElement('div');
                    el.className = 'casilla';
                    if (explorado[f][c]) {
                        el.classList.add('visible');
                        if (mapa[f][c] === 1) el.classList.add('muro');
                        enemigos.forEach(en => { if(en.x === f && en.y === c && en.vivo) el.innerText = en.icono; });
                    }
                    if (f === heroe.x && c === heroe.y) el.innerText = heroe.icono;
                    tablero.appendChild(el);
                }
            }
            let enemigoCerca = enemigos.find(en => en.vivo && esAdyacente(heroe, en));
            document.getElementById('btn-atk').disabled = !(turno === "jugador" && enemigoCerca);
            document.getElementById('lista-enemigos').innerHTML = enemigos.filter(e => e.vivo).map(e => `${e.nombre}: ${e.vida} PV`).join('<br>');
            document.getElementById('mov-heroe').innerText = heroe.mov;
            document.getElementById('vida-heroe').innerText = heroe.vida;
        }

        function tirarDadosMovimiento() {
            heroe.mov = Math.floor(Math.random()*6) + Math.floor(Math.random()*6) + 2;
            log(`Movimiento: ${heroe.mov}`);
            document.getElementById('btn-mov').disabled = true;
            dibujar();
        }

        function atacarEnemigo() {
            let en = enemigos.find(en => en.vivo && esAdyacente(heroe, en));
            let atk = lanzarDados(heroe.atk, true);
            let def = lanzarDados(en.def, false);
            let dano = Math.max(0, atk.calaveras - def.escudos);
            en.vida -= dano;
            log(`Atacas ${en.nombre}: ${atk.calaveras} vs ${def.escudos}. Daño: ${dano}`);
            if(en.vida <= 0) { en.vivo = false; log(`${en.nombre} eliminado.`); }
            finalizarTurno();
        }

        function finalizarTurno() {
            heroe.mov = 0; turno = "enemigo";
            document.getElementById('turno-txt').innerText = "Turno: Enemigo";
            dibujar();
            setTimeout(turnoEnemigo, 1000);
        }

        function turnoEnemigo() {
            enemigos.forEach(en => {
                if(!en.vivo) return;
                if(esAdyacente(en, heroe)) {
                    let atk = lanzarDados(en.atk, false);
                    let def = lanzarDados(heroe.def, true);
                    let dano = Math.max(0, atk.calaveras - def.escudos);
                    heroe.vida -= dano;
                    log(`${en.nombre} ataca: ${atk.calaveras} vs ${def.escudos}. Daño: ${dano}`);
                } else {
                    if(en.x < heroe.x && mapa[en.x+1][en.y]===0) en.x++;
                    else if(en.x > heroe.x && mapa[en.x-1][en.y]===0) en.x--;
                    else if(en.y < heroe.y && mapa[en.x][en.y+1]===0) en.y++;
                    else if(en.y > heroe.y && mapa[en.x][en.y-1]===0) en.y--;
                }
            });
            turno = "jugador";
            document.getElementById('turno-txt').innerText = "Turno: Jugador";
            document.getElementById('btn-mov').disabled = false;
            if(heroe.vida <= 0) { alert("¡Has muerto!"); location.reload(); }
            dibujar();
        }

        window.addEventListener('keydown', (e) => {
            if(turno !== "jugador" || heroe.mov <= 0) return;
            let nx = heroe.x, ny = heroe.y;
            if(e.key === 'ArrowUp') nx--; if(e.key === 'ArrowDown') nx++;
            if(e.key === 'ArrowLeft') ny--; if(e.key === 'ArrowRight') ny++;
            if(nx>=0 && nx<FILAS && ny>=0 && ny<COLS && mapa[nx][ny]===0 && !enemigos.find(en => en.vivo && en.x===nx && en.y===ny)) {
                heroe.x = nx; heroe.y = ny; heroe.mov--;
                if(heroe.mov === 0) finalizarTurno();
                dibujar();
            }
        });
    </script>
</body>
</html>
