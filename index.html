<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>War Quest - Versión Definitiva</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pantalla-seleccion">
        <h1>War Quest</h1>
        <p>Selecciona a tu héroe para entrar a la mazmorra:</p>
        <div id="selector" class="grid-heroe"></div>
    </div>

    <div id="juego-contenedor" style="display:none;">
        <div id="tablero"></div>
        <div class="panel-lateral">
            <div id="info-heroe">
                <h2 id="nombre-heroe"></h2>
                <p id="desc-heroe"></p>
                <p>Vida: <span id="vida-heroe"></span></p>
                <p>Movimiento: <span id="mov-heroe"></span></p>
            </div>
            <div class="controles">
                <button onclick="tirarDados()">Tirar Dados</button>
                <button onclick="finalizarTurno()">Finalizar Turno</button>
            </div>
            <div id="log-combate"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
