<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hero Quest Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de Selección de Personaje -->
    <div id="pantalla-seleccion">
        <h1>Elige tu Héroe</h1>
        <div id="selector" class="grid-heroe"></div>
    </div>

    <!-- Contenedor del Juego -->
    <div id="juego-contenedor" style="display:none;">
        <div id="tablero"></div>
        <div class="panel">
            <h2 id="nombre-heroe"></h2>
            <p>Vida: <span id="vida-heroe"></span></p>
            <p>Movimiento: <span id="mov-heroe"></span></p>
            <button id="btn-mov" onclick="tirarDadosMovimiento()">Tirar Dados Movimiento</button>
            <button id="btn-atk" onclick="atacarEnemigo()" disabled>Atacar</button>
            <button onclick="finalizarTurno()">Finalizar Turno</button>
            <div id="log-combate"></div>
        </div>
    </div>

    <!-- Pantalla de Derrota -->
    <div id="pantalla-derrota" style="display:none;">
        <h1 style="color: #ff4444; font-size: 3em;">¡HAS MUERTO!</h1>
        <p>Tu aventura ha llegado a un fin trágico.</p>
        <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1.2em; cursor:pointer;">Volver a Intentarlo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
