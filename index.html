<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>War Quest - Sistema de Combate Visual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pantalla-seleccion">
        <h1>War Quest</h1>
        <p class="subtitulo">Selecciona a tu héroe para entrar a la mazmorra:</p>
        <div id="selector" class="grid-heroe"></div>
    </div>

    <div id="juego-contenedor" style="display:none;">
        <div id="tablero"></div>
        
        <div class="panel-lateral">
            <div id="info-heroe">
                <h2 id="nombre-heroe"></h2>
                <p id="desc-heroe" class="descripcion"></p>
                <div class="stats-box">
                    <p>❤️ Tu Vida Actual: <span id="vida-heroe" class="stat-val"></span></p>
                    <p>👣 Pasos Restantes: <span id="mov-heroe" class="stat-val"></span></p>
                </div>
            </div>

            <div id="pantalla-combate-inmediato">
                <h4>⚔️ PANEL DE COMBATE RECIENTE ⚔️</h4>
                <div id="resultado-dados-pantalla">Esperando que comience la batalla...</div>
            </div>
            
            <div class="controles">
                <button id="btn-dados" onclick="tirarDados()">🎲 Lanzar Dados Movimiento</button>
                <button id="btn-atacar" onclick="atacarEnemigoAdyacente()">⚔️ ACCIÓN: Atacar Enemigo</button>
                <button id="btn-turno" onclick="finalizarTurno()">🛡️ Terminar Mi Turno</button>
            </div>
            
            <h3>Historial General</h3>
            <div id="log-combate"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
